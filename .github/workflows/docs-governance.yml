name: Docs Governance

on:
  pull_request:
    paths:
      - 'Docs/**'
      - 'scripts/docs/sync_docs_versioning.py'
      - 'Makefile'
      - '.github/workflows/docs-governance.yml'
  push:
    branches:
      - main
    paths:
      - 'Docs/**'
      - 'scripts/docs/sync_docs_versioning.py'
      - 'Makefile'
      - '.github/workflows/docs-governance.yml'

jobs:
  docs-versioning:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate docs registry and headers
        run: make docs-check